services:
  - type: web
    name: osed
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py copy_demo_media_to_static
      python manage.py ensure_schema
      python manage.py migrate
      python manage.py load_indepth_blueprint
      python manage.py seed_schools
      python manage.py seed_branding
      python manage.py createsuperuser --noinput || true
    startCommand: gunicorn osed.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "0"
      - key: MEDIA_AS_STATIC
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: osed-test-db
          property: connectionString
      # Optional (only needed if you want to lock hosts explicitly)
      # - key: ALLOWED_HOSTS
      #   value: "your-service.onrender.com"
      # Optional (if you use Microsoft login in Render)
      # - key: MICROSOFT_CLIENT_ID
      #   value: ""
      # - key: MICROSOFT_CLIENT_SECRET
      #   value: ""
      # - key: MICROSOFT_TENANT
      #   value: "organizations"

      # Recommended for persistent media uploads (logos/branding): Azure Blob Storage
      # When enabled, you usually don't want Django serving /media from local disk.
      # - key: USE_AZURE_MEDIA_STORAGE
      #   value: "1"
      # - key: SERVE_MEDIA
      #   value: "0"
      # - key: AZURE_ACCOUNT_NAME
      #   value: ""
      # - key: AZURE_ACCOUNT_KEY
      #   value: ""
      # - key: AZURE_CONTAINER
      #   value: "media"
      # Optional:
      # - key: AZURE_CUSTOM_DOMAIN
      #   value: ""

databases:
  - name: osed-test-db
    plan: free
