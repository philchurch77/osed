services:
  - type: web
    name: osed
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py seed_schools
      python manage.py seed_branding
    startCommand: gunicorn osed.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "0"
      - key: SERVE_MEDIA
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: osed-test-db
          property: connectionString
      # Optional (only needed if you want to lock hosts explicitly)
      # - key: ALLOWED_HOSTS
      #   value: "your-service.onrender.com"
      # Optional (if you use Microsoft login in Render)
      # - key: MICROSOFT_CLIENT_ID
      #   value: ""
      # - key: MICROSOFT_CLIENT_SECRET
      #   value: ""
      # - key: MICROSOFT_TENANT
      #   value: "organizations"

databases:
  - name: osed-test-db
    plan: free
